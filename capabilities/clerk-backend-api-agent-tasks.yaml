        description: Create Agent Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: agents-tasks-agent-task-id-revoke
      path: /agents/tasks/{agent_task_id}/revoke
      operations:
      - name: RevokeAgentTask
        method: POST
        description: Revoke Agent Task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: agent_task_id
          in: path
          type: string
          description: The ID of the agent task to be revoked.
          required: true

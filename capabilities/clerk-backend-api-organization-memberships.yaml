          type: string
          description: The ID of the organization to which this membership belongs
          required: true
        - name: user_id
          in: path
          type: string
          description: The ID of the user to which this membership belongs
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

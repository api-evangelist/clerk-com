naftiko: 1.0.0-alpha2
info:
  label: Clerk Frontend Api — Subscriptions
  description: 'Clerk Subscriptions capability. 2 operations. Lead operation: Get User''s Main Billing Subscription.'
  tags:
  - Clerk
  - Subscriptions
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    CLERK_PUBLISHABLE_KEY: CLERK_PUBLISHABLE_KEY
capability:
  consumes:
  - type: http
    namespace: clerk-frontend-api-subscriptions
    baseUri: ''
    description: Clerk clerk-frontend-api Subscriptions business capability.
    resources:
    - name: v1-me-billing-subscription
      path: /v1/me/billing/subscription
      operations:
      - name: GetUserMainBillingSubscription
        method: GET
        description: Get User's Main Billing Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-organizations-organizationid-billing-subscription
      path: /v1/organizations/{organizationID}/billing/subscription
      operations:
      - name: GetOrganizationBillingSubscription
        method: GET
        description: Get Organization's Billing Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationID
          in: path
          type: string
          description: The ID of the organization
          required: true

      path: /invitations/{invitation_id}/revoke
      operations:
      - name: RevokeInvitation
        method: POST
        description: Revokes an Invitation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: invitation_id
          in: path
          type: string
          description: The ID of the invitation to be revoked
          required: true

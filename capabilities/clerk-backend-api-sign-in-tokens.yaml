naftiko: 1.0.0-alpha2
info:
  label: Clerk Backend Api — Sign-in Tokens
  description: 'Clerk Sign-in Tokens capability. 2 operations. Lead operation: Create Sign-in Token.'
  tags:
  - Clerk
  - Sign-in Tokens
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    CLERK_SECRET_KEY: CLERK_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: clerk-backend-api-sign-in-tokens
    baseUri: https://api.clerk.com/v1
    description: Clerk clerk-backend-api Sign-in Tokens business capability.
    resources:
    - name: sign-in-tokens
      path: /sign_in_tokens
      operations:
      - name: CreateSignInToken
        method: POST
        description: Create Sign-in Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: sign-in-tokens-sign-in-token-id-revoke
      path: /sign_in_tokens/{sign_in_token_id}/revoke
      operations:
      - name: RevokeSignInToken
        method: POST
        description: Revoke the Given Sign-in Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sign_in_token_id
          in: path
          type: string
          description: The ID of the sign-in token to be revoked
          required: true

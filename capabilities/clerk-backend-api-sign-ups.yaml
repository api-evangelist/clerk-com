naftiko: 1.0.0-alpha2
info:
  label: Clerk Backend Api — Sign Ups
  description: 'Clerk Sign Ups capability. 2 operations. Lead operation: Retrieve a Sign-up by ID.'
  tags:
  - Clerk
  - Sign Ups
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    CLERK_SECRET_KEY: CLERK_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: clerk-backend-api-sign-ups
    baseUri: https://api.clerk.com/v1
    description: Clerk clerk-backend-api Sign Ups business capability.
    resources:
    - name: sign-ups-id
      path: /sign_ups/{id}
      operations:
      - name: GetSignUp
        method: GET
        description: Retrieve a Sign-up by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the sign-up to retrieve
          required: true
      - name: UpdateSignUp
        method: PATCH
        description: Update a Sign-up
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The ID of the sign-up to update
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true

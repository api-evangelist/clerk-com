naftiko: 1.0.0-alpha2
info:
  label: Clerk Backend Api — Webhooks
  description: 'Clerk Webhooks capability. 3 operations. Lead operation: Create a Svix App.'
  tags:
  - Clerk
  - Webhooks
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    CLERK_SECRET_KEY: CLERK_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: clerk-backend-api-webhooks
    baseUri: https://api.clerk.com/v1
    description: Clerk clerk-backend-api Webhooks business capability.
    resources:
    - name: webhooks-svix
      path: /webhooks/svix
      operations:
      - name: CreateSvixApp
        method: POST
        description: Create a Svix App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: DeleteSvixApp
        method: DELETE
        description: Delete a Svix App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: webhooks-svix-url
      path: /webhooks/svix_url
      operations:
      - name: GenerateSvixAuthURL
        method: POST
        description: Create a Svix Dashboard URL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
